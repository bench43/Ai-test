<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DCT Slide 6 — 6 Options</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
.header { background: #1a2e4a; padding: 16px 20px; border-bottom: 3px solid #c8a96e; }
.header h1 { color: #fff; font-size: 16px; font-weight: 700; }
.header p { color: #a0b0c0; font-size: 11px; margin-top: 3px; }
.controls { background: #1a1a1a; padding: 16px 20px; border-bottom: 1px solid #2a2a2a; }
.controls label { display: block; font-size: 10px; color: #888; font-weight: 700; margin-bottom: 6px; letter-spacing: 1.5px; text-transform: uppercase; }
.controls input { width: 100%; border: 1px solid #333; border-radius: 8px; background: #222; padding: 11px 14px; font-size: 14px; outline: none; color: #fff; font-family: monospace; margin-bottom: 10px; }
.controls input:focus { border-color: #c8a96e; }
.key-note { font-size: 10px; color: #444; margin-bottom: 12px; }
.btn-gen { width: 100%; background: #E8583A; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-gen:disabled { background: #3a3a3a; color: #666; cursor: not-allowed; }
.progress-bar-wrap { height: 3px; background: #1a1a1a; }
.progress-bar-fill { height: 3px; background: #c8a96e; width: 0%; transition: width 0.4s; }
.status { padding: 8px 20px; font-size: 11px; color: #555; background: #111; border-bottom: 1px solid #1a1a1a; min-height: 28px; }
.main { padding: 20px; max-width: 1000px; margin: 0 auto; }
.design-block { margin-bottom: 40px; }
.design-label { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.design-num { width: 32px; height: 32px; border-radius: 50%; background: #E8583A; color: #fff; font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.design-name { font-size: 14px; font-weight: 700; color: #fff; }
.design-concept { font-size: 10px; color: #c8a96e; margin-top: 2px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.design-desc { font-size: 11px; color: #666; margin-top: 4px; line-height: 1.6; }
.img-box { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; background: #1a2e4a; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
.img-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
.placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.placeholder-txt { color: rgba(255,255,255,0.2); font-size: 12px; }
.spinner { width: 28px; height: 28px; border: 2.5px solid rgba(255,255,255,0.08); border-top-color: #c8a96e; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.err-box { padding: 20px; text-align: center; }
.err-msg { color: #f08080; font-size: 11px; margin-bottom: 10px; line-height: 1.5; }
.btn-retry { background: transparent; border: 1px solid #c8a96e; color: #c8a96e; padding: 7px 16px; border-radius: 6px; font-size: 11px; cursor: pointer; }
.dl-row { margin-top: 8px; }
.btn-dl { width: 100%; background: transparent; border: 1px solid #2a2a2a; color: #444; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: not-allowed; }
.btn-dl.ready { border-color: #c8a96e; color: #c8a96e; cursor: pointer; }
.divider { border: none; border-top: 1px solid #1a1a1a; margin: 32px 0; }
</style>
</head>
<body>
<div class="header">
  <h1>DCT Slide 6 — 6 Visual Options</h1>
  <p>Same content · same bubble logic · 6 completely different visual treatments · gpt-image-2</p>
</div>
<div class="controls">
  <label>OpenAI API Key</label>
  <input type="password" id="apikey" placeholder="sk-…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <div class="key-note">Sent only to OpenAI · not stored anywhere</div>
  <button class="btn-gen" id="btnGen" onclick="startGen()">Generate All 6 Options</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="pBar"></div></div>
<div class="status" id="statusTxt">Paste your OpenAI key and tap Generate.</div>
<div class="main" id="grid"></div>

<script>
const store = {};
let done = 0;
const TOTAL = 6;

const CORE_CONTENT = `
BUBBLE SIZING — THE CORE RULE:
Bubble SIZE must be proportional to the number. Old target was HIGHER, so OLD TARGET BUBBLE IS BIGGER. New target is lower, so NEW TARGET BUBBLE IS SMALLER. The SIZE difference communicates the downward revision without reading a single number. This is non-negotiable.

LEFT SIDE CONTENT — KPI BUBBLES:

OVERNIGHT GUESTS — two parent bubbles side by side at same height:
• OLD TARGET bubble (LARGER): grey-navy fill, person icon, number "XX" bold white, label "OLD TARGET" above
• NEW TARGET bubble (SMALLER): coral fill, person icon, number "XX" bold white, label "NEW TARGET" above
• From OLD TARGET bubble bottom: two child bubbles hang below connected by lines:
  - Left child: "INTL XX" (old international target)
  - Right child: "DOM XX" (old domestic target)
• From NEW TARGET bubble bottom: two child bubbles hang below:
  - Left child: "INTL XX" (new international target, coral outline)
  - Right child: "DOM XX" (new domestic target, coral outline)
• Child bubbles proportionally sized to each other
• Delta annotation between the pair: "▼ -XX%"

HOTEL REVENUE — two parent bubbles side by side:
• OLD TARGET (LARGER): grey-navy, hotel/building icon, "AED XX"
• NEW TARGET (SMALLER): coral, hotel/building icon, "AED XX"
• No child bubbles for revenue
• Delta annotation: "▼ -XX%"

RIGHT SIDE CONTENT — 3 SIGNAL BOXES:
Three stacked boxes, each with:
  Left portion: icon + signal name (bold) + 1-line consultant description
  Right portion: embedded mini data chart

SIGNAL 1 — Recovery Curves (coral accent):
  Globe icon · "Recovery Curves" · "Peer markets fell 12–30% in Year 1 — AUH within the band"
  Chart: Indexed multi-line chart. X=Year 0→3. Y=visitor index (100=pre-conflict). 4 peer lines (THA/JPN/TUN/EGY) dip then recover. Dashed coral AUH line within the shaded peer band.

SIGNAL 2 — Seat Connectivity (navy accent):
  Plane icon · "Seat Connectivity" · "Inbound seat supply contracted — hard ceiling on arrivals"
  Chart: Diverging horizontal bars. Rows=Q1/Q2/Q3/Q4. Bars extend LEFT from zero baseline showing -22%, -35%, -41%, -XX%. Bars in coral/red. Getting progressively longer.

SIGNAL 3 — Net Sentiment (green accent):
  Speech bubble with descending bars icon · "Net Sentiment" · "Below benchmark in all source markets — demand suppressed"
  Chart: Lollipop dot plot. Y-axis=GCC/India/UK/Germany/KSA. All dots cluster 28–52. Vertical dashed benchmark line at 70. All dots left of benchmark. Dots in green.

FOOTER: "© Department of Culture and Tourism — Abu Dhabi · Conflict-adjusted targets · 2026"
DCT geometric ornament (interlocking circles + diamond) in top-right corner.
This is a printed 16:9 professional slide — not a website, not HTML.`;

const DESIGNS = [
  {
    id: 1,
    name: "Option 1 — Warm Cream Editorial",
    concept: "Annual report style · cream bg · coral/grey bubbles · clean charts",
    desc: "Classic DCT brand. Cream background, coral new-target bubbles, larger grey old-target bubbles. Charts are precise and minimal. Feels like a premium annual report page.",
    prompt: `Professional DCT Abu Dhabi leadership slide, 16:9 image output.

VISUAL TREATMENT: Warm editorial annual report style.
• Background: warm cream (#EDE5D8) full bleed
• Old target bubbles: large, filled muted grey-navy (#8a9ab0), clearly bigger
• New target bubbles: smaller, filled bright coral (#E8583A)
• Child bubbles: coral outline on cream for new children; grey outline for old children
• Signal boxes: white cards with subtle shadow, coloured left border bars
• Charts: clean black/grey on white, coral for AUH/highlight elements
• Typography: dark near-black for labels, bold heavy for numbers
• Overall feel: premium, restrained, authoritative — like McKinsey or BCG annual report page
• DCT geometric ornament in top-right in coral

Slide title: "Overnight guests and hotel revenue targets revised — three demand signals explain the gap"

${CORE_CONTENT}`
  },
  {
    id: 2,
    name: "Option 2 — Dark Navy Premium",
    concept: "Dark luxury · navy bg · glowing coral new targets · ghost old targets",
    desc: "Deep navy full bleed. New target bubbles glow in coral. Old target bubbles are larger but ghost/outline only — they are the faded past. Charts bright on dark cards. Premium, dramatic.",
    prompt: `Professional DCT Abu Dhabi leadership slide, 16:9 image output.

VISUAL TREATMENT: Dark luxury premium.
• Background: deep navy (#0d1e30) full bleed
• Old target bubbles: LARGE ghost circles — white outline only, 15% opacity fill, clearly bigger than new
• New target bubbles: smaller but bright solid coral (#E8583A), glowing against dark bg
• Child bubbles: coral outline for new; ghost white outline for old
• Signal boxes: dark cards (#111827), coloured left borders (coral/navy/green)
• Charts: bright coloured elements on dark — coral lines, vivid dots, white axis labels
• Typography: white throughout, bold heavy for numbers
• Feel: sovereign wealth fund presentation, ADNOC-style premium dark
• DCT ornament: coral/gold version top-right

Slide title: "Overnight guests and hotel revenue targets revised — three demand signals explain the gap"

${CORE_CONTENT}`
  },
  {
    id: 3,
    name: "Option 3 — Split Panel Diagonal",
    concept: "Diagonal colour split · coral upper-left · cream lower-right",
    desc: "Bold diagonal cut. Coral upper-left panel holds the bubble diagram. Cream lower-right panel holds the signal boxes. The cut creates visual tension. Charts are embedded in cream cards.",
    prompt: `Professional DCT Abu Dhabi leadership slide, 16:9 image output.

VISUAL TREATMENT: Bold diagonal split panel.
• Background: diagonal cut from top-left to bottom-right. Upper-left triangle: coral (#E8583A). Lower-right triangle: cream (#EDE5D8)
• The bubble diagram sits in the coral zone — white bubbles with dark numbers for new targets, cream/outlined for old targets
• The three signal boxes sit in the cream zone
• A bold diagonal line separates the two zones
• Typography: white on coral side, dark on cream side
• Charts: dark on cream background
• Feel: bold, editorial, unexpected layout — like a Monocle or Wired data spread
• DCT ornament: white version on coral, dark version on cream, top-right

Slide title spans full width at top in a dark (#1a1a1a) header strip.

${CORE_CONTENT}`
  },
  {
    id: 4,
    name: "Option 4 — Newspaper Column Grid",
    concept: "FT/Economist editorial · column grid · headline banner · structured",
    desc: "Treated as a breaking data story. Dark header bar with bold headline. Bubble diagram in left columns. Signal boxes as editorial sidebar columns on right. Feels like FT or The Economist data page.",
    prompt: `Professional DCT Abu Dhabi leadership slide, 16:9 image output.

VISUAL TREATMENT: Financial Times / Economist newspaper editorial grid.
• Full slide background: off-white (#F5F2EC)
• TOP HEADER BAR (full width, dark #1a1a1a, ~15% height): "TARGETS REVISED" in massive bold white type left-aligned. Right: DCT coral ornament. Below header: thin coral rule line.
• LEFT ZONE (50%): The bubble diagram rendered in a structured column grid style. Bubbles are drawn with editorial precision — clean outlines, numbers in bold serif-ish style. Old target bubbles larger in dark grey. New target in coral. Thin connecting lines to children. Very precise, no decorative elements.
• VERTICAL RULE: thin dark line dividing left and right
• RIGHT ZONE (50%): Three signal boxes stacked. Each styled like an editorial sidebar box with a small coloured header bar. Charts inside each box styled like FT chart typography — minimal, precise, annotated.
• Footer: small italic source line at bottom
• Overall: restraint, precision, editorial authority. Zero decoration.

Slide title already in header bar.

${CORE_CONTENT}`
  },
  {
    id: 5,
    name: "Option 5 — Radial Bubble Network",
    concept: "Network diagram · bubbles connected organically · signals as satellite nodes",
    desc: "The two KPI bubble groups flow organically like a network diagram. Curved connector lines link parents to children. Signal boxes on the right are rounded cards connected by thin lines suggesting causality. More organic and visual than a grid.",
    prompt: `Professional DCT Abu Dhabi leadership slide, 16:9 image output.

VISUAL TREATMENT: Organic network / bubble diagram style — like a high-end consulting network map.
• Background: cream (#EDE5D8)
• LEFT ZONE: Bubble groups arranged as an organic network. The two groups (overnight guests and hotel revenue) each have their parent bubbles connected to child bubbles via CURVED organic lines (not straight). The layout feels like a mind map or network diagram — generous spacing, bubbles float with breathing room.
• Old target bubbles: larger, filled light grey with soft shadow effect
• New target bubbles: smaller, filled coral with subtle glow
• Delta annotations: small coral pill badges showing "-XX%" near each pair
• RIGHT ZONE: Three signal cards styled as rounded rectangular cards with soft shadows. Each card has the icon, name, description AND chart. Cards connected to a central "VERDICT" node at bottom right by thin lines, suggesting the three signals feed into one conclusion. The verdict node: dark circle with "-XX% REVISION" in coral.
• Charts: slightly more stylised — the line chart has a subtle area fill, the bars have rounded ends, the lollipops have filled circles.
• Overall: organic, flowing, premium consulting feel — McKinsey innovation practice style

Slide title: top-left, large bold on cream.

${CORE_CONTENT}`
  },
  {
    id: 6,
    name: "Option 6 — Minimalist White Space",
    concept: "Maximum whitespace · numbers breathe · pure typography + geometry",
    desc: "Almost uncomfortably minimal. Huge whitespace. Bubbles are sparse and precise. Numbers are enormous. The charts are small but perfect. Inspired by Apple keynote data slides and Pentagram annual reports.",
    prompt: `Professional DCT Abu Dhabi leadership slide, 16:9 image output.

VISUAL TREATMENT: Ultra-minimalist whitespace — Apple keynote meets Pentagram annual report.
• Background: pure white (#FFFFFF) — maximum brightness and clarity
• Only essential elements exist — no borders, no shadows, no decorative lines
• LEFT ZONE: Bubble pairs with maximum breathing room. Bubbles drawn as clean geometric circles — no gradients, no glow, flat fill. Old target: large flat grey circle (#C5C5C5). New target: smaller flat coral circle (#E8583A). Numbers inside are ENORMOUS relative to bubble size — the number IS the bubble. Child bubbles: very small, connected by hairline-thin lines.
• A single thin coral horizontal rule separates overnight guests group from hotel revenue group
• RIGHT ZONE: Three signal entries — minimal. No box borders. Just: icon + bold signal name + one-line description + chart floating in white space. Charts are tiny and precise — no chart borders, no background fills, just the data marks on white.
• Typography: one weight (black) for numbers, one weight (regular) for all labels. Very large numbers.
• Coral (#E8583A) used ONLY as accent — the new target bubbles and the chart highlights. Everything else is grey or black.
• DCT ornament: hairline version top-right
• Feel: Jony Ive would approve. Silence and precision.

Slide title: top-left, medium bold black, no decoration.

${CORE_CONTENT}`
  }
];

const grid = document.getElementById('grid');
DESIGNS.forEach((d, i) => {
  const block = document.createElement('div');
  block.className = 'design-block';
  block.innerHTML = `
    <div class="design-label">
      <div class="design-num">${d.id}</div>
      <div>
        <div class="design-name">${d.name}</div>
        <div class="design-concept">${d.concept}</div>
        <div class="design-desc">${d.desc}</div>
      </div>
    </div>
    <div class="img-box" id="f${d.id}">
      <div class="placeholder"><div class="placeholder-txt">Waiting…</div></div>
    </div>
    <div class="dl-row">
      <button class="btn-dl" id="dl${d.id}" onclick="dlImg(${d.id})">↓ Download Option ${d.id}</button>
    </div>
    ${i < DESIGNS.length - 1 ? '<div class="divider"></div>' : ''}
  `;
  grid.appendChild(block);
});

async function startGen() {
  const key = document.getElementById('apikey').value.trim();
  if (!key) { setStatus(0, '⚠ Paste your OpenAI key first.'); return; }
  done = 0;
  document.getElementById('btnGen').disabled = true;
  setStatus(0, 'Firing all 6 in parallel…');
  DESIGNS.forEach(d => setLoading(d.id));
  // Batch in 2 waves of 3 to avoid rate limits
  await Promise.allSettled(DESIGNS.slice(0,3).map(d => gen(d.id, d.prompt, key)));
  await Promise.allSettled(DESIGNS.slice(3).map(d => gen(d.id, d.prompt, key)));
  const msg = done === TOTAL ? `✓ All 6 options ready. Tap any download to save.` : `Done — ${done}/${TOTAL} succeeded. Retry any failures.`;
  setStatus(100, msg);
  document.getElementById('btnGen').disabled = false;
}

async function gen(id, prompt, key, isRetry = false) {
  try {
    const res = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'gpt-image-2', prompt, n: 1, size: '1536x864', quality: 'medium' })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) { DESIGNS.forEach(d => setErr(d.id, 'Invalid API key.')); setStatus(null, '✗ Invalid API key.'); document.getElementById('btnGen').disabled = false; return; }
      if (res.status === 429 && !isRetry) { await new Promise(r => setTimeout(r, 4000)); return gen(id, prompt, key, true); }
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const url = `data:image/png;base64,${data.data[0].b64_json}`;
    store[id] = url; setImg(id, url); done++;
    setStatus(Math.round((done / TOTAL) * 100), `Generated ${done} of ${TOTAL}…`);
  } catch(e) { setErr(id, e.message || 'Unknown error.'); }
}

function setLoading(id) {
  document.getElementById(`f${id}`).innerHTML = `<div class="placeholder"><div class="spinner"></div><div class="placeholder-txt">Generating option ${id}…</div></div>`;
  document.getElementById(`dl${id}`).classList.remove('ready');
}
function setImg(id, url) {
  document.getElementById(`f${id}`).innerHTML = `<img src="${url}" alt="Option ${id}">`;
  document.getElementById(`dl${id}`).classList.add('ready');
}
function setErr(id, msg) {
  document.getElementById(`f${id}`).innerHTML = `<div class="err-box"><div class="err-msg">✗ ${msg}</div><button class="btn-retry" onclick="gen(${id}, DESIGNS[${id-1}].prompt, document.getElementById('apikey').value.trim())">Retry ${id}</button></div>`;
}
function setStatus(pct, msg) {
  if (pct !== null) document.getElementById('pBar').style.width = pct + '%';
  if (msg) document.getElementById('statusTxt').textContent = msg;
}
function dlImg(id) {
  if (!store[id]) return;
  const a = document.createElement('a'); a.href = store[id]; a.download = `dct_slide6_option${id}.png`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
</script>
</body>
</html>
