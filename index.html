<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DCT Slide 6 — Bubble KPIs + Signal Charts</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
.header { background: #1a2e4a; padding: 16px 20px; border-bottom: 3px solid #c8a96e; }
.header h1 { color: #fff; font-size: 16px; font-weight: 700; }
.header p { color: #a0b0c0; font-size: 11px; margin-top: 3px; }
.controls { background: #1a1a1a; padding: 16px 20px; border-bottom: 1px solid #2a2a2a; }
.controls label { display: block; font-size: 10px; color: #888; font-weight: 700; margin-bottom: 6px; letter-spacing: 1.5px; text-transform: uppercase; }
.controls input { width: 100%; border: 1px solid #333; border-radius: 8px; background: #222; padding: 11px 14px; font-size: 14px; outline: none; color: #fff; font-family: monospace; margin-bottom: 10px; }
.controls input:focus { border-color: #c8a96e; }
.key-note { font-size: 10px; color: #444; margin-bottom: 12px; }
.btn-gen { width: 100%; background: #E8583A; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-gen:disabled { background: #3a3a3a; color: #666; cursor: not-allowed; }
.progress-bar-wrap { height: 3px; background: #1a1a1a; }
.progress-bar-fill { height: 3px; background: #c8a96e; width: 0%; transition: width 0.4s; }
.status { padding: 8px 20px; font-size: 11px; color: #555; background: #111; border-bottom: 1px solid #1a1a1a; min-height: 28px; }
.main { padding: 20px; max-width: 1000px; margin: 0 auto; }
.design-block { margin-bottom: 40px; }
.design-label { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.design-num { width: 32px; height: 32px; border-radius: 50%; background: #E8583A; color: #fff; font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.design-name { font-size: 14px; font-weight: 700; color: #fff; }
.design-concept { font-size: 10px; color: #c8a96e; margin-top: 2px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.design-desc { font-size: 11px; color: #666; margin-top: 4px; line-height: 1.6; }
.img-box { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; background: #1a2e4a; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
.img-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
.placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.placeholder-txt { color: rgba(255,255,255,0.2); font-size: 12px; }
.spinner { width: 28px; height: 28px; border: 2.5px solid rgba(255,255,255,0.08); border-top-color: #c8a96e; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.err-box { padding: 20px; text-align: center; }
.err-msg { color: #f08080; font-size: 11px; margin-bottom: 10px; line-height: 1.5; }
.btn-retry { background: transparent; border: 1px solid #c8a96e; color: #c8a96e; padding: 7px 16px; border-radius: 6px; font-size: 11px; cursor: pointer; }
.dl-row { margin-top: 8px; }
.btn-dl { width: 100%; background: transparent; border: 1px solid #2a2a2a; color: #444; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: not-allowed; }
.btn-dl.ready { border-color: #c8a96e; color: #c8a96e; cursor: pointer; }
.divider { border: none; border-top: 1px solid #1a1a1a; margin: 32px 0; }
</style>
</head>
<body>
<div class="header">
  <h1>DCT Slide 6 — Proportional Bubbles + Signal Charts</h1>
  <p>Bubble SIZE carries the meaning · 2 colour variants · gpt-image-2</p>
</div>
<div class="controls">
  <label>OpenAI API Key</label>
  <input type="password" id="apikey" placeholder="sk-…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <div class="key-note">Sent only to OpenAI · not stored anywhere</div>
  <button class="btn-gen" id="btnGen" onclick="startGen()">Generate Both Variants</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="pBar"></div></div>
<div class="status" id="statusTxt">Paste your OpenAI key and tap Generate.</div>
<div class="main" id="grid"></div>

<script>
const store = {};
let done = 0;
const TOTAL = 2;

const BUBBLE_LOGIC = `
CRITICAL BUBBLE SIZING RULE — this is the core visual principle:
Bubble SIZE must be PROPORTIONAL to the number it represents. The old target was LARGER than the new target. Therefore the OLD TARGET bubble must be VISIBLY BIGGER than the NEW TARGET bubble. The size difference communicates the downward revision instantly — no text needed. A viewer should look at the two bubbles and immediately understand "the old target was bigger, the new target is smaller." This is the entire point of using bubbles instead of numbers in boxes.

Specifically:
- OLD TARGET overnight guests bubble: the LARGEST circle on the left panel (biggest number = biggest circle)
- NEW TARGET overnight guests bubble: noticeably SMALLER — sits beside the old one at same height
- OLD TARGET hotel revenue bubble: second-largest pair
- NEW TARGET hotel revenue bubble: smaller than its old pair
- Child bubbles (INTL and DOM): always smaller than their parent, but also sized relative to each other (International is usually larger than Domestic, so international child bubble is bigger)

The visual hierarchy tells the story: big old bubble → smaller new bubble → even smaller children branching below.`;

const LAYOUT = `
EXACT SLIDE LAYOUT — 16:9 ratio:

SLIDE TITLE (top strip, full width): Bold headline: "Overnight guests and hotel revenue targets revised — three signals explain the gap"
DCT geometric ornament (interlocking circles + diamond shape) in top-right corner.

======= LEFT PANEL (48% of slide width) =======
Two separate bubble groups stacked vertically, with generous space between them.

--- GROUP 1: OVERNIGHT GUESTS (top half of left panel) ---

Two large parent circles side by side at the SAME vertical level:

LEFT PARENT CIRCLE — "NEW TARGET":
- Small label above: "NEW TARGET" in small caps
- Circle filled with DCT coral (#E8583A)
- Inside: person/silhouette icon at top, then large white number "XX" bold, then small unit below
- This circle is SMALLER than the old target circle

RIGHT PARENT CIRCLE — "OLD TARGET":
- Small label above: "OLD TARGET" in small caps  
- Circle filled with muted grey-navy (showing it's the past/reference)
- Inside: same person icon, large white number "XX" bold (the higher original target)
- This circle is LARGER than the new target circle — visually communicates the original was bigger

Thin connector lines drop DOWN from bottom of each parent circle to two child circles below:

From NEW TARGET (left parent) — two small circles branching down:
  Child LEFT: coral outline, white fill, plane icon, "INTL" label, number "XX"
  Child RIGHT: coral outline, white fill, home icon, "DOM" label, number "XX"
  Child sizes proportional to each other (INTL > DOM if international is larger number)

From OLD TARGET (right parent) — two small circles branching down:
  Child LEFT: grey outline, "INTL" label, number "XX" (old international target)
  Child RIGHT: grey outline, "DOM" label, number "XX" (old domestic target)

--- GROUP 2: HOTEL REVENUE (bottom half of left panel) ---

Two circles side by side, same logic:
LEFT: "NEW TARGET" — coral, SMALLER circle, building/hotel icon, "AED XX" bold white
RIGHT: "OLD TARGET" — grey-navy, LARGER circle (old target was higher), "AED XX" bold white
No child bubbles for hotel revenue.

A small delta annotation between each pair: "▼ -XX%" in a small dark pill label

======= THIN VERTICAL DIVIDER LINE =======

======= RIGHT PANEL (52% of slide width) =======
Three stacked signal boxes, each ~1/3 height of right panel.
Each box has a LEFT SECTION (~35% of box width) and a RIGHT SECTION with an embedded chart (~65% of box width).

--- SIGNAL BOX 1: Recovery Curves ---
Left border accent: thick coral (#E8583A) bar on left edge
Left section: 
  Globe/world icon (line drawing style, clean)
  Bold label: "Recovery Curves"
  One-line description: "Post-conflict peer markets declined 12–30% in Year 1 — AUH projected within band"
  
Right section — INDEXED LINE CHART:
  X-axis: "Year 0" (conflict start) → "Year 1" → "Year 2" → "Year 3"
  Y-axis: Visitor index (Pre-conflict = 100)
  Four thin lines for Thailand (blue), Japan (green), Tunisia (orange), Egypt (purple) — all start at 100, drop sharply to 70–85 range at Year 1, then curve upward
  One DASHED CORAL line: "AUH projected" — follows similar trajectory within the band
  Grey shaded band showing the peer recovery range
  Minimal gridlines, clean labels, tiny country name labels at end of lines
  Chart title in tiny text: "Visitor arrivals index (pre-conflict = 100)"

--- SIGNAL BOX 2: Seat Connectivity ---
Left border accent: thick navy (#1a2e4a) bar
Left section:
  Airplane icon
  Bold label: "Seat Connectivity"
  One-line: "Inbound seat supply into AUH contracted — hard ceiling on international arrivals"

Right section — DIVERGING HORIZONTAL BAR CHART:
  Central zero baseline (vertical line in centre)
  Horizontal bars extending LEFT (negative = seat contraction) from the zero line
  Rows: "Q1 post-conflict: -22%", "Q2: -35%", "Q3: -41%", "Q4 projected: -XX%"
  Bars in deep red/coral on left of zero
  Each bar clearly labelled with its % value
  Zero line marked "Pre-conflict baseline"
  The bars get progressively longer (worse) going down — shows deterioration
  Very clean, minimal, no grid noise

--- SIGNAL BOX 3: Net Sentiment ---
Left border accent: thick green (#1A7A4A) bar
Left section:
  Speech bubble icon with three descending bars inside (sentiment going down)
  Bold label: "Net Sentiment"
  One-line: "Destination sentiment below benchmark in all source markets — demand suppressed"

Right section — LOLLIPOP DOT PLOT:
  Vertical axis (Y): five source markets listed top to bottom: GCC, India, UK, Germany, KSA
  Horizontal axis (X): sentiment score 0 to 100
  Each market: a thin horizontal line extending from left edge ending in a filled CIRCLE (lollipop)
  All circles cluster between 28–52 on the scale
  A vertical dashed line at x=70 labelled "Benchmark"
  ALL circles are clearly to the LEFT of the benchmark — visually proves all markets are below target
  Circles coloured green (#1A7A4A)
  Clean, spacious, easy to read at small size

======= FOOTER (bottom strip) =======
"© Department of Culture and Tourism — Abu Dhabi · Conflict-adjusted targets · 2026"
Small: "Source: UNWTO peer benchmarks · OAG seat data · DCT sentiment index"`;

const DCT_RULES = `
DCT ABU DHABI BRAND:
• This is a professional printed slide, 16:9 ratio — NOT a website, NOT HTML, NOT an app screen
• Generate as a single polished image
• Background: warm cream (#EDE5D8) — gives the slide warmth and authority
• Primary accent: DCT coral (#E8583A)
• Supporting: deep navy (#1a2e4a), grey for reference/old data, green (#1A7A4A) for sentiment signal
• DCT geometric ornament (interlocking half-circles + diamond/rhombus) in top-right
• Heavy bold typography for KPI numbers, clean light font for chart labels
• Generous whitespace — leadership slides breathe
• The three charts on the right must look like REAL charts — precise, data-driven, not decorative`;

const DESIGNS = [
  {
    id: 1,
    name: "Variant A — Cream & Coral",
    concept: "Warm editorial · cream bg · coral new targets · grey old targets",
    desc: "Old target bubbles are larger and grey — they represent what was before. New target bubbles are smaller and coral — the revised reality. The SIZE difference is the message. Charts are clean and minimal on cream.",
    prompt: `Create a professional executive leadership slide for DCT Abu Dhabi. 16:9 ratio. High quality image output.

VARIANT A: Cream (#EDE5D8) background. New target bubbles are coral (#E8583A). Old target bubbles are larger and filled muted grey-navy to show they are reference/past values. The contrast between big grey (old) and smaller coral (new) tells the story of downward revision instantly.

${BUBBLE_LOGIC}

${LAYOUT}

${DCT_RULES}`
  },
  {
    id: 2,
    name: "Variant B — Dark Premium",
    concept: "Deep navy bg · coral new targets glow · ghost old targets fade",
    desc: "Deep navy background makes the coral new-target bubbles pop. Old target bubbles are large but ghost/semi-transparent — they are the faded past. Smaller glowing coral bubbles are the present reality. Charts on dark cards with bright data elements.",
    prompt: `Create a professional executive leadership slide for DCT Abu Dhabi. 16:9 ratio. High quality image output.

VARIANT B: Deep navy (#0d1e30) full-bleed background. New target bubbles glow in coral (#E8583A) — bright and solid. Old target bubbles are LARGER but rendered as ghost/outline-only circles, semi-transparent, clearly showing they were the bigger original targets now replaced. The size contrast is critical — large ghost old target beside smaller glowing coral new target.

${BUBBLE_LOGIC}

${LAYOUT}

DARK VARIANT OVERRIDES:
• Background: deep navy (#0d1e30) full bleed
• New target bubbles: bright solid coral (#E8583A), glowing quality
• Old target bubbles: large ghost circles — white/cream outline only, filled with very subtle transparency, clearly subordinate
• Child bubbles: coral outline for new children, ghost outline for old children
• Divider line: subtle white at 20% opacity
• Right panel signal boxes: dark card (#111827) background, coloured left borders
• Charts: bright elements on dark backgrounds — coral lines, coloured dots, white axis labels
• All text: white or light cream
• DCT ornament: coral/gold version
• Footer: subtle white at 50% opacity

${DCT_RULES}`
  }
];

const grid = document.getElementById('grid');
DESIGNS.forEach((d, i) => {
  const block = document.createElement('div');
  block.className = 'design-block';
  block.innerHTML = `
    <div class="design-label">
      <div class="design-num">${d.id}</div>
      <div>
        <div class="design-name">${d.name}</div>
        <div class="design-concept">${d.concept}</div>
        <div class="design-desc">${d.desc}</div>
      </div>
    </div>
    <div class="img-box" id="f${d.id}">
      <div class="placeholder"><div class="placeholder-txt">Waiting…</div></div>
    </div>
    <div class="dl-row">
      <button class="btn-dl" id="dl${d.id}" onclick="dlImg(${d.id})">↓ Download ${d.name}</button>
    </div>
    ${i < DESIGNS.length - 1 ? '<div class="divider"></div>' : ''}
  `;
  grid.appendChild(block);
});

async function startGen() {
  const key = document.getElementById('apikey').value.trim();
  if (!key) { setStatus(0, '⚠ Paste your OpenAI key first.'); return; }
  done = 0;
  document.getElementById('btnGen').disabled = true;
  setStatus(0, 'Generating both variants in parallel…');
  DESIGNS.forEach(d => setLoading(d.id));
  await Promise.allSettled(DESIGNS.map(d => gen(d.id, d.prompt, key)));
  const msg = done === TOTAL ? '✓ Both variants ready — tap download to save.' : `Done — ${done}/${TOTAL} succeeded.`;
  setStatus(100, msg);
  document.getElementById('btnGen').disabled = false;
}

async function gen(id, prompt, key, isRetry = false) {
  try {
    const res = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'gpt-image-2', prompt, n: 1, size: '1536x864', quality: 'medium' })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) { DESIGNS.forEach(d => setErr(d.id, 'Invalid API key.')); setStatus(null, '✗ Invalid API key.'); document.getElementById('btnGen').disabled = false; return; }
      if (res.status === 429 && !isRetry) { await new Promise(r => setTimeout(r, 3500)); return gen(id, prompt, key, true); }
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const url = `data:image/png;base64,${data.data[0].b64_json}`;
    store[id] = url; setImg(id, url); done++;
    setStatus(Math.round((done / TOTAL) * 100), `Generated ${done} of ${TOTAL}…`);
  } catch(e) { setErr(id, e.message || 'Unknown error.'); }
}

function setLoading(id) {
  document.getElementById(`f${id}`).innerHTML = `<div class="placeholder"><div class="spinner"></div><div class="placeholder-txt">Generating…</div></div>`;
  document.getElementById(`dl${id}`).classList.remove('ready');
}
function setImg(id, url) {
  document.getElementById(`f${id}`).innerHTML = `<img src="${url}" alt="Variant ${id}">`;
  document.getElementById(`dl${id}`).classList.add('ready');
}
function setErr(id, msg) {
  document.getElementById(`f${id}`).innerHTML = `<div class="err-box"><div class="err-msg">✗ ${msg}</div><button class="btn-retry" onclick="gen(${id}, DESIGNS[${id-1}].prompt, document.getElementById('apikey').value.trim())">Retry</button></div>`;
}
function setStatus(pct, msg) {
  if (pct !== null) document.getElementById('pBar').style.width = pct + '%';
  if (msg) document.getElementById('statusTxt').textContent = msg;
}
function dlImg(id) {
  if (!store[id]) return;
  const a = document.createElement('a'); a.href = store[id]; a.download = `dct_slide6_v${id}.png`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
</script>
</body>
</html>
