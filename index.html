<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DCT Slide Generator — 5 Designs</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
.header { background: #1a2e4a; padding: 16px 20px; border-bottom: 3px solid #c8a96e; }
.header h1 { color: #fff; font-size: 16px; font-weight: 700; }
.header p { color: #a0b0c0; font-size: 11px; margin-top: 3px; }
.controls { background: #1a1a1a; padding: 16px 20px; border-bottom: 1px solid #2a2a2a; }
.controls label { display: block; font-size: 10px; color: #888; font-weight: 700; margin-bottom: 6px; letter-spacing: 1.5px; text-transform: uppercase; }
.controls input { width: 100%; border: 1px solid #333; border-radius: 8px; background: #222; padding: 11px 14px; font-size: 14px; outline: none; color: #fff; font-family: monospace; margin-bottom: 10px; }
.controls input:focus { border-color: #c8a96e; }
.key-note { font-size: 10px; color: #444; margin-bottom: 12px; }
.btn-gen { width: 100%; background: #E8583A; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; }
.btn-gen:disabled { background: #3a3a3a; color: #666; cursor: not-allowed; }
.progress-bar-wrap { height: 3px; background: #1a1a1a; }
.progress-bar-fill { height: 3px; background: #c8a96e; width: 0%; transition: width 0.4s; }
.status { padding: 8px 20px; font-size: 11px; color: #555; background: #111; border-bottom: 1px solid #1a1a1a; min-height: 28px; }
.main { padding: 20px; max-width: 1000px; margin: 0 auto; }
.design-block { margin-bottom: 48px; }
.design-label { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.design-num { width: 32px; height: 32px; border-radius: 50%; background: #E8583A; color: #fff; font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.design-name { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
.design-concept { font-size: 10px; color: #c8a96e; margin-top: 2px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.design-desc { font-size: 11px; color: #555; margin-top: 4px; line-height: 1.5; }
.img-box { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; background: #1a2e4a; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
.img-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
.placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.placeholder-txt { color: rgba(255,255,255,0.2); font-size: 12px; }
.spinner { width: 28px; height: 28px; border: 2.5px solid rgba(255,255,255,0.08); border-top-color: #c8a96e; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.err-box { padding: 20px; text-align: center; }
.err-msg { color: #f08080; font-size: 11px; margin-bottom: 10px; line-height: 1.5; }
.btn-retry { background: transparent; border: 1px solid #c8a96e; color: #c8a96e; padding: 7px 16px; border-radius: 6px; font-size: 11px; cursor: pointer; }
.dl-row { margin-top: 8px; }
.btn-dl { width: 100%; background: transparent; border: 1px solid #2a2a2a; color: #444; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: not-allowed; }
.btn-dl.ready { border-color: #c8a96e; color: #c8a96e; cursor: pointer; }
.divider { border: none; border-top: 1px solid #1a1a1a; margin: 36px 0; }
</style>
</head>
<body>
<div class="header">
  <h1>DCT Abu Dhabi — Leadership Slide Generator</h1>
  <p>5 structural concepts · gpt-image-2 · DCT brand · research-grounded</p>
</div>
<div class="controls">
  <label>OpenAI API Key</label>
  <input type="password" id="apikey" placeholder="sk-…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <div class="key-note">Sent only to OpenAI · not stored anywhere</div>
  <button class="btn-gen" id="btnGen" onclick="startGen()">Generate All 5 Designs</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="pBar"></div></div>
<div class="status" id="statusTxt">Paste your OpenAI key and tap Generate.</div>
<div class="main" id="grid"></div>

<script>
const store = {};
let done = 0;
const TOTAL = 5;

const DCT = `
STRICT DCT ABU DHABI BRAND RULES — follow exactly:
• Primary background: warm cream (#EDE5D8) OR DCT coral (#E8583A) — no generic blue/grey
• DCT coral (#E8583A) is the hero accent colour
• Secondary palette: deep navy (#1a2e4a), hot crimson (#D4175A), forest green (#1A7A4A), near-black (#1a1a1a)
• DCT geometric ornament (interlocking circles + diamond/rhombus shape) always in top-right corner
• Typography: heavy weight, large scale, editorial — this is a LEADERSHIP slide not a report
• No bullet lists, no tables — pure visual hierarchy
• All three signals must have distinct icons: globe for recovery curves, airplane for seat connectivity, speech-bubble-with-descending-bars for net sentiment
• Conclusion: always a near-black (#1a1a1a) panel with a large coral number showing -XX% revision impact
• The word "XX" is a placeholder — render it as actual styled text on the slide
• This is a printed slide, 16:9, no HTML elements, no browser UI, no code`;

const CONTENT = `
KPI BLOCK — three metrics, before/after conflict:
1. Overnight guests: XX total · International XX · Domestic XX · Old target was XX · Revised to XX · Change: -XX%
2. Hotel revenue: AED XX · Old target AED XX · Revised to AED XX · Change: -XX%  
3. Occupancy rate: XX% · Old target XX% · Revised to XX% · Change: -XX%

SIGNAL BLOCK — three demand signals that drove the downward revision:
Signal 1 (globe icon): Recovery curves — Thailand, Japan, Tunisia, Egypt each saw 12–30% visitor drop in Year 1 post-conflict. AUH sits within their band. → Calibrates pace of decline
Signal 2 (airplane icon): Seat connectivity — Inbound airline seat supply into AUH contracted sharply. Hard ceiling on arrivals. → Sets volume ceiling  
Signal 3 (speech bubble icon): Net sentiment — Fell across GCC, Europe, South Asia. Demand suppression confirmed. → Validates demand drop

CONCLUSION: All three signals independently confirm the same verdict — targets revised down -XX% from original. Dark panel, large coral number.

Brand: Department of Culture and Tourism — Abu Dhabi (DCT Abu Dhabi) · 2026`;

const DESIGNS = [
  {
    id: 1,
    name: "Waterfall Deviation",
    concept: "FT Visual Vocabulary — deviation/waterfall chart",
    desc: "KPIs shown as a waterfall: original target bar → gap bar (the conflict impact, in red) → new target bar. Methodology signals on right as annotated timeline.",
    prompt: `Design concept: WATERFALL DEVIATION CHART — inspired by Financial Times Visual Vocabulary "deviation" category and McKinsey waterfall slides.

Action title: "Conflict impact quantified: three signals explain the full downward revision across all KPIs"

LEFT SIDE (60% width) — WATERFALL / DEVIATION CHART:
Show three horizontal waterfall sequences, one per KPI, stacked vertically:
Row 1 — Overnight guests: [Original target bar, coral] → [Gap/decline bar, dark red with downward arrow] → [New target bar, navy]. Label each segment. The gap bar is labelled "-XX%" prominently.
Row 2 — Hotel revenue: same structure, AED values.
Row 3 — Occupancy: same structure, % values.
Above the chart: "ORIGINAL TARGET" label on left column, "CONFLICT IMPACT" centre (red), "REVISED TARGET" right (navy).
This is a deviation waterfall — the middle red bars are the story.
Make the bars clean, professional, generous whitespace between rows.

RIGHT SIDE (40% width) — SIGNAL ANNOTATIONS:
Cream (#EDE5D8) panel. Three signal blocks stacked:
Each has: large coloured number (01, 02, 03), icon, signal name in bold, one punchy line. A small right-arrow connecting each to the waterfall conclusion.
Below all three: dark conclusion box with "-XX%" large in coral.

DCT geometric ornament top-right. Cream background overall.

${CONTENT}
${DCT}`
  },
  {
    id: 2,
    name: "Bullet Chart Scorecard",
    concept: "Stephen Few bullet chart — actual vs target vs benchmark",
    desc: "Each KPI as a bullet chart bar: benchmark range shown as background band, old target as marker line, new target as bar. Signals as icon cards below.",
    prompt: `Design concept: BULLET CHART SCORECARD — based on Stephen Few's bullet chart methodology, widely used in HBR and executive dashboards for comparing actual vs target vs benchmark in a single compact visual.

Action title: "All KPIs revised below original targets — three signals provide the analytical basis"

TOP SECTION (55% height) — THREE BULLET CHARTS stacked:
Each bullet chart row has:
- Left label: KPI name + unit (large, bold)
- Background: wide grey band showing the "benchmark range" (peer tourism destinations)
- Thin vertical line: original pre-conflict target (labelled "Pre-conflict target")
- Solid horizontal bar: new revised target (coral #E8583A fill, extends to the new lower value)
- A gap annotation between the line and bar end: "-XX%" in dark red with bracket
KPI 1: Overnight guests (XXM)
KPI 2: Hotel revenue (AED XXB)  
KPI 3: Occupancy rate (XX%)
Use generous padding between rows. Add benchmark band label: "Peer destination range".

BOTTOM SECTION (45% height) — SIGNAL ICONS ROW:
Three cards side by side in cream (#EDE5D8):
Each card: coloured top border (coral/crimson/green), large icon (globe/plane/speech bubble), signal name bold, one-line descriptor, impact tag pill.
Dark conclusion bar spanning full width below: "-XX% CONFLICT-ADJUSTED REVISION · ALL SIGNALS ALIGNED" white on black, coral accent.

DCT geometric ornament top-right. Cream (#EDE5D8) background.

${CONTENT}
${DCT}`
  },
  {
    id: 3,
    name: "Newspaper Front Page",
    concept: "Editorial newspaper / FT front page layout",
    desc: "Treated as a breaking news story. Bold headline banner. KPI numbers in large editorial type with 'vs target' annotations. Signals as news sidebar column.",
    prompt: `Design concept: NEWSPAPER EDITORIAL / FT FRONT PAGE — inspired by how the Financial Times and The Economist present major economic data stories. Treat this as a front-page data story, not a corporate slide.

Action title: "TARGETS CUT" — displayed as a breaking headline in massive type

LAYOUT — newspaper column grid:

HEADER BAR (top, full width, dark #1a1a1a): 
Left: "DCT ABU DHABI · LEADERSHIP BRIEFING · 2026" in small caps coral.
Right: DCT geometric ornament.
Below: thick coral rule line.

MAIN HEADLINE (full width): "TARGETS CUT" in enormous bold white type (80pt weight) on dark background. Below it in smaller text: "Regional conflict forces downward revision across all tourism KPIs — three independent signals confirm the same impact."

THREE-COLUMN BODY LAYOUT (below headline):
Column 1 — Overnight guests: large number "XX" in coral as hero stat, below it "▼ -XX% vs target" in bold red, below that "Was: XX · Now: XX" in grey caption style. Small horizontal bar showing before/after magnitude.
Column 2 — Hotel revenue: same treatment. "AED XX" hero, "▼ -XX%" bold red.
Column 3 — Occupancy: "XX%" hero, "▼ -XX%" bold red.
Vertical column rules separating them.

RIGHT SIDEBAR (30% width, cream #EDE5D8 background, separated by thick rule):
"THE EVIDENCE" as sidebar header in coral.
Three signal blocks with icons (globe, plane, speech bubble), name, one-line descriptor. 
Bottom of sidebar: dark box "-XX% REVISION CONFIRMED".

Background: cream (#EDE5D8). This should feel like journalism, not PowerPoint.

${CONTENT}
${DCT}`
  },
  {
    id: 4,
    name: "Radial Impact Map",
    concept: "Circular/radial layout — conflict at centre, KPIs radiate outward",
    desc: "Central dark circle shows conflict event. Three KPI arcs radiate outward showing the impact. Signals shown as satellite nodes. Used in annual reports for causal mapping.",
    prompt: `Design concept: RADIAL IMPACT / CAUSAL MAP — inspired by how top annual reports (LVMH, Sovereign Wealth Fund reports) and McKinsey use circular/radial diagrams to show a central cause radiating to multiple outcomes.

Action title: "One conflict. Three signals. Three KPI revisions. All pointing the same direction."

LAYOUT — radial/circular:

CENTRE: Large dark circle (#1a1a1a) with coral border ring. Inside: "REGIONAL CONFLICT" label + small warning icon. This is the cause.

THREE KPI ARCS (radiating left/upper-left/lower-left from centre):
Arc 1 — Overnight guests: coral arc line curving from centre to a KPI card. Card: "OVERNIGHT GUESTS" label, "XX" large white on coral, "▼ -XX% vs target" below, "Was XX · Now XX" caption.
Arc 2 — Hotel revenue: navy arc line. Card: "HOTEL REVENUE", "AED XX" large, "▼ -XX%".
Arc 3 — Occupancy: green arc line. Card: "OCCUPANCY", "XX%" large, "▼ -XX%".

THREE SIGNAL NODES (radiating right from centre):
Three smaller circles connected to centre by dashed lines (coral/crimson/green):
Node 1 (coral): Globe icon + "Recovery Curves" + "12–30% peer decline"
Node 2 (crimson): Plane icon + "Seat Connectivity" + "Supply contracted"  
Node 3 (green): Speech bubble icon + "Net Sentiment" + "Demand suppressed"

Below the radial diagram, full-width dark bar: "ALL SIGNALS CONFIRM: -XX% REVISION · CONFLICT-ADJUSTED BASELINE · 2026"

Background: warm cream (#EDE5D8). DCT ornament top-right. Generous whitespace — this diagram needs room to breathe.

${CONTENT}
${DCT}`
  },
  {
    id: 5,
    name: "Split Scorecard + Convergence Funnel",
    concept: "McKinsey 2-panel: left data scorecard, right signal funnel",
    desc: "Left: a clean scorecard table rendered as a visual with sparkline-style before/after bars. Right: three signals flowing into a convergence funnel — the FT 'part-to-whole' concept applied to evidence.",
    prompt: `Design concept: TWO-PANEL SCORECARD + CONVERGENCE FUNNEL — combining McKinsey's clean data scorecard approach (left) with the FT Visual Vocabulary "flow" concept (right). The right panel shows three inputs converging into one output — a visual proof structure.

Action title: "Three signals. One conclusion. Targets revised -XX% across the board."

LEFT PANEL (48% width, cream #EDE5D8 background):
Header: "KPI SCORECARD — CONFLICT ADJUSTMENT" in small coral caps.
Three KPI rows, each as a visual scorecard entry:
Each row has:
- KPI name (bold, large)
- A small horizontal "before/after" bar: two bars side by side, left bar (coral, taller = old target), right bar (navy, shorter = new target). Gap visually shows the decline.
- Old target value label above left bar, new target value above right bar
- Large "-XX%" delta label to the right of bars in dark red
- Thin rule separator between rows
KPI 1: Overnight guests · KPI 2: Hotel revenue · KPI 3: Occupancy
Footer note: "Source: DCT conflict-adjusted model · 2026"

RIGHT PANEL (52% width, dark #1a1a1a background):
Header: "SIGNAL CONVERGENCE" in coral small caps.
Three signal inputs at top, each in a coloured rounded box:
Box 1 (coral): Globe icon · "Recovery Curves" · "4 peer markets · 12–30% decline"
Box 2 (crimson): Plane icon · "Seat Connectivity" · "AUH supply contracted sharply"
Box 3 (green): Speech bubble icon · "Net Sentiment" · "Fell across all source markets"
Three arrows/lines flowing DOWN from the three boxes, converging into a single wide funnel shape pointing to:
OUTPUT BOX (full width, coral border, dark fill): Large white "-XX%" centred. Below: "CONFLICT-ADJUSTED REVISION · ALL SIGNALS INDEPENDENTLY CONFIRM"

DCT geometric ornament top-right (on the dark panel). Clean, no clutter.

${CONTENT}
${DCT}`
  }
];

// Build UI
const grid = document.getElementById('grid');
DESIGNS.forEach((d, i) => {
  const block = document.createElement('div');
  block.className = 'design-block';
  block.innerHTML = `
    <div class="design-label">
      <div class="design-num">${d.id}</div>
      <div>
        <div class="design-name">${d.name}</div>
        <div class="design-concept">${d.concept}</div>
        <div class="design-desc">${d.desc}</div>
      </div>
    </div>
    <div class="img-box" id="f${d.id}">
      <div class="placeholder"><div class="placeholder-txt">Waiting…</div></div>
    </div>
    <div class="dl-row">
      <button class="btn-dl" id="dl${d.id}" onclick="dlImg(${d.id})">↓ Download Design ${d.id} — ${d.name}</button>
    </div>
    ${i < DESIGNS.length - 1 ? '<div class="divider"></div>' : ''}
  `;
  grid.appendChild(block);
});

async function startGen() {
  const key = document.getElementById('apikey').value.trim();
  if (!key) { setStatus(0, '⚠ Paste your OpenAI key first.'); return; }
  done = 0;
  document.getElementById('btnGen').disabled = true;
  setStatus(0, 'Firing all 5 designs in parallel…');
  DESIGNS.forEach(d => setLoading(d.id));
  await Promise.allSettled(DESIGNS.map(d => gen(d.id, d.prompt, key)));
  const msg = done === TOTAL ? `✓ All ${TOTAL} designs ready. Tap any download button to save.` : `Done — ${done}/${TOTAL} succeeded. Tap Retry on any that failed.`;
  setStatus(100, msg);
  document.getElementById('btnGen').disabled = false;
}

async function gen(id, prompt, key, isRetry = false) {
  try {
    const res = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'gpt-image-2', prompt, n: 1, size: '1536x864', quality: 'medium' })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) { DESIGNS.forEach(d => setErr(d.id, 'Invalid API key.', d.prompt, key)); setStatus(null, '✗ Invalid API key.'); document.getElementById('btnGen').disabled = false; return; }
      if (res.status === 429 && !isRetry) { await new Promise(r => setTimeout(r, 3500)); return gen(id, prompt, key, true); }
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const url = `data:image/png;base64,${data.data[0].b64_json}`;
    store[id] = url;
    setImg(id, url);
    done++;
    setStatus(Math.round((done / TOTAL) * 100), `Generated ${done} of ${TOTAL} designs…`);
  } catch(e) {
    setErr(id, e.message || 'Unknown error — tap Retry.', prompt, key);
  }
}

function setLoading(id) {
  document.getElementById(`f${id}`).innerHTML = `<div class="placeholder"><div class="spinner"></div><div class="placeholder-txt">Generating design ${id}…</div></div>`;
  const btn = document.getElementById(`dl${id}`); btn.classList.remove('ready');
}
function setImg(id, url) {
  document.getElementById(`f${id}`).innerHTML = `<img src="${url}" alt="Design ${id}">`;
  const btn = document.getElementById(`dl${id}`); btn.classList.add('ready');
}
function setErr(id, msg, prompt, key) {
  document.getElementById(`f${id}`).innerHTML = `<div class="err-box"><div class="err-msg">✗ ${msg}</div><button class="btn-retry" onclick="gen(${id}, DESIGNS[${id-1}].prompt, document.getElementById('apikey').value.trim())">Retry Design ${id}</button></div>`;
}
function setStatus(pct, msg) {
  if (pct !== null) document.getElementById('pBar').style.width = pct + '%';
  if (msg) document.getElementById('statusTxt').textContent = msg;
}
function dlImg(id) {
  if (!store[id]) return;
  const a = document.createElement('a'); a.href = store[id]; a.download = `dct_design_${id}.png`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
</script>
</body>
</html>
